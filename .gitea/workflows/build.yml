name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        working-directory: bridge
        run: go build ./...

      - name: Test
        working-directory: bridge
        run: go test ./...

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Gitea Registry
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | \
            docker login git.zk35.de -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build and push
        run: |
          IMAGE=git.zk35.de/zk35admin/bayrol-bridge
          docker build -f bridge/Dockerfile -t ${IMAGE}:${{ github.sha }} bridge/
          docker tag ${IMAGE}:${{ github.sha }} ${IMAGE}:latest
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest
