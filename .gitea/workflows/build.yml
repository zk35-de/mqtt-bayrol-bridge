name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        working-directory: bridge
        run: go build ./...

      - name: Test
        working-directory: bridge
        run: go test ./...

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Gitea Registry
        run: |
          echo "${{ secrets.BAYROLCI }}" | \
            podman login git.zk35.de -u secalpha --password-stdin

      - name: Build and push bridge
        run: |
          IMAGE=git.zk35.de/secalpha/bayrol-bridge
          podman build -f bridge/Dockerfile \
            -t ${IMAGE}:${{ github.sha }} \
            -t ${IMAGE}:latest \
            bridge/
          podman push ${IMAGE}:${{ github.sha }}
          podman push ${IMAGE}:latest

      - name: Build and push mosquitto
        run: |
          IMAGE=git.zk35.de/secalpha/bayrol-bridge-mosquitto
          podman build \
            -t ${IMAGE}:${{ github.sha }} \
            -t ${IMAGE}:latest \
            mosquitto/
          podman push ${IMAGE}:${{ github.sha }}
          podman push ${IMAGE}:latest
