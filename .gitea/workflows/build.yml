name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        working-directory: bridge
        run: go build ./...

      - name: Test
        working-directory: bridge
        run: go test ./...

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static

      - name: Login to Gitea Registry
        run: |
          echo "${{ secrets.BAYROLCI }}" | \
            podman login git.zk35.de -u secalpha --password-stdin

      - name: Set version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build amd64
        run: |
          IMAGE=git.zk35.de/secalpha/bayrol-bridge
          podman build \
            --platform linux/amd64 \
            -t ${IMAGE}:${{ steps.version.outputs.tag }}-amd64 \
            .
          podman push ${IMAGE}:${{ steps.version.outputs.tag }}-amd64

      - name: Build arm64
        run: |
          IMAGE=git.zk35.de/secalpha/bayrol-bridge
          podman build \
            --platform linux/arm64 \
            -t ${IMAGE}:${{ steps.version.outputs.tag }}-arm64 \
            .
          podman push ${IMAGE}:${{ steps.version.outputs.tag }}-arm64

      - name: Create and push manifest
        run: |
          IMAGE=git.zk35.de/secalpha/bayrol-bridge
          VERSION=${{ steps.version.outputs.tag }}
          podman manifest create ${IMAGE}:${VERSION} \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64
          podman manifest push ${IMAGE}:${VERSION}
          podman manifest create ${IMAGE}:latest \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64
          podman manifest push ${IMAGE}:latest
