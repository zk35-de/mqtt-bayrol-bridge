name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    - cron: "15 3 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        working-directory: bridge
        run: go build ./...

      - name: Test
        working-directory: bridge
        run: go test ./...

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static

      - name: Login to Gitea Registry
        run: |
          echo "${{ secrets.BAYROLCI }}" | \
            podman login git.zk35.de -u secalpha --password-stdin

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build amd64
        run: |
          IMAGE=git.zk35.de/secalpha/bayrol-bridge
          TAG=${{ steps.version.outputs.tag }}
          podman build \
            --platform linux/amd64 \
            --build-arg TARGETOS=linux \
            --build-arg TARGETARCH=amd64 \
            --build-arg VERSION=${TAG} \
            -t ${IMAGE}:${TAG}-amd64 .
          podman push ${IMAGE}:${TAG}-amd64

      - name: Build arm64
        run: |
          IMAGE=git.zk35.de/secalpha/bayrol-bridge
          TAG=${{ steps.version.outputs.tag }}
          podman build \
            --platform linux/arm64 \
            --build-arg TARGETOS=linux \
            --build-arg TARGETARCH=arm64 \
            --build-arg VERSION=${TAG} \
            -t ${IMAGE}:${TAG}-arm64 .
          podman push ${IMAGE}:${TAG}-arm64

      - name: Build armv7
        run: |
          IMAGE=git.zk35.de/secalpha/bayrol-bridge
          TAG=${{ steps.version.outputs.tag }}
          podman build \
            --platform linux/arm/v7 \
            --build-arg TARGETOS=linux \
            --build-arg TARGETARCH=arm \
            --build-arg GOARM=7 \
            --build-arg VERSION=${TAG} \
            -t ${IMAGE}:${TAG}-armv7 .
          podman push ${IMAGE}:${TAG}-armv7

      - name: Create and push manifest
        run: |
          IMAGE=git.zk35.de/secalpha/bayrol-bridge
          TAG=${{ steps.version.outputs.tag }}

          if [[ "${TAG}" != "latest" ]]; then
            podman manifest rm ${IMAGE}:${TAG} 2>/dev/null || true
            podman rmi --force ${IMAGE}:${TAG} 2>/dev/null || true
            podman manifest create ${IMAGE}:${TAG} \
              ${IMAGE}:${TAG}-amd64 \
              ${IMAGE}:${TAG}-arm64 \
              ${IMAGE}:${TAG}-armv7
            podman manifest push ${IMAGE}:${TAG}
          fi

          podman manifest rm ${IMAGE}:latest 2>/dev/null || true
          podman rmi --force ${IMAGE}:latest 2>/dev/null || true
          podman manifest create ${IMAGE}:latest \
            ${IMAGE}:${TAG}-amd64 \
            ${IMAGE}:${TAG}-arm64 \
            ${IMAGE}:${TAG}-armv7
          podman manifest push ${IMAGE}:latest