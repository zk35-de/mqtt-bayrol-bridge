# Bayrol MQTT Interception – Port 8883 (TLS, Bayrol-facing)
# Gerät validiert kein TLS-Zertifikat, Self-Signed reicht

listener 8883 0.0.0.0
allow_anonymous true
cafile /mosquitto/certs/bayrol-ca.crt
certfile /mosquitto/certs/bayrol-server.crt
keyfile /mosquitto/certs/bayrol-server.key
tls_version tlsv1.2

# Interner Listener für Go-Bridge (Docker-Network, kein TLS)
listener 1883 0.0.0.0
allow_anonymous true

persistence false
log_dest stdout
