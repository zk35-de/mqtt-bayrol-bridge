services:
  mosquitto:
    image: git.zk35.de/secalpha/bayrol-bridge-mosquitto:latest
    ports:
      - "8883:8883"
    volumes:
      - certs:/mosquitto/certs
    restart: unless-stopped

  bridge:
    image: git.zk35.de/secalpha/bayrol-bridge:latest
    depends_on:
      - mosquitto
    volumes:
      - ./config.yaml:/config.yaml:ro
    restart: unless-stopped

volumes:
  certs:
